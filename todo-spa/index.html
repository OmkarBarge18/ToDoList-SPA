<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
 
    <header class="app-header">
      <h1 class="app-title">todos</h1>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>
 
    <!-- Add todo input row -->
    <div class="input-card">
      <div class="input-row">
        <button id="toggle-all-btn" class="toggle-all-btn" title="Mark all complete" aria-label="Mark all complete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
        <input
          id="todo-input"
          class="todo-input"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
          maxlength="200"
          aria-label="New todo"
        />
        <button id="add-btn" class="add-btn" aria-label="Add todo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
 
    <!-- Todo list -->
    <div class="list-card" id="list-card">
      <ul id="todo-list" class="todo-list" aria-label="Todo list" aria-live="polite"></ul>
 
      <!-- Empty state -->
      <div id="empty-state" class="empty-state" hidden>
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.25">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="9" y1="13" x2="15" y2="13"/>
        </svg>
        <p id="empty-message">Nothing to do — add something above</p>
      </div>
 
      <!-- Footer -->
      <footer class="footer" id="footer" hidden>
        <span id="count" class="item-count"></span>
        <div class="filters" role="group" aria-label="Filter todos">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clear-completed" class="clear-btn" hidden>Clear done</button>
      </footer>
    </div>
 
  </main>
 
  <!-- Scripts -->
  <script src="state.js"></script>
  <script src="render.js"></script>
  <script src="events.js"></script>
  <script src="main.js"></script>
</body>
</html>
